spring:
  application:
    name: globalcards

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        linger.ms: 5
        enable.idempotence: true
        spring.json.add.type.headers: false

  datasource:
    url: jdbc:postgresql://localhost:5432/globalcards
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false  # Disable auto-run to control job execution

# AWS Configuration
aws:
  region: ${AWS_REGION:us-east-1}
  credentials:
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}
  s3:
    bucket: ${S3_BUCKET:global-cards-bucket}
    input-folder: ${S3_INPUT_FOLDER:input/}
    output-folder: ${S3_OUTPUT_FOLDER:output/}

# Logging
logging:
  level:
    com.bank.globalcards: DEBUG
    org.springframework.batch: DEBUG
    software.amazon.awssdk: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
